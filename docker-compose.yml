services:
  bot:
    build: .
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    network_mode: service:postgres
    depends_on:
      - postgres
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?}
      JAMENDO_CLIENT_ID: ${JAMENDO_CLIENT_ID:?}
      DATABASE_URL: ""
      EXTERNAL_DATABASE_URL: ${EXTERNAL_DATABASE_URL:-}
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: lofi
      POSTGRES_USER: lofi
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-change-me}
      DEFAULT_CATEGORY: ${DEFAULT_CATEGORY:-lofi}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      JAMENDO_REFRESH_HOUR: ${JAMENDO_REFRESH_HOUR:-4}
      REFRESH_TIMEZONE: ${REFRESH_TIMEZONE:-Asia/Tokyo}
      JAMENDO_LIMIT_PER_CATEGORY: ${JAMENDO_LIMIT_PER_CATEGORY:-200}
      SYNC_COMMANDS: ${SYNC_COMMANDS:-true}
      BGM_JOIN_TTS_API_URL: ${BGM_JOIN_TTS_API_URL:-}
      BGM_JOIN_TTS_API_TOKEN: ${BGM_JOIN_TTS_API_TOKEN:-}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.50"
    shm_size: 64mb
    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - max_connections=10
    environment:
      POSTGRES_DB: lofi
      POSTGRES_USER: lofi
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - lofi-postgres
          - postgres
          - db
      join-tts: {}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U lofi -d lofi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

volumes:
  postgres-data:

networks:
  default:
  join-tts:
    name: ${BGM_JOIN_TTS_NETWORK:-voicevox-discord-tts}
    external: true
