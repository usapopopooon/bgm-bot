services:
  bot:
    build: .
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.50"
    depends_on:
      - postgres
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?}
      JAMENDO_CLIENT_ID: ${JAMENDO_CLIENT_ID:?}
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-lofi-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: lofi
      POSTGRES_USER: lofi
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      DEFAULT_CATEGORY: ${DEFAULT_CATEGORY:-lofi}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      JAMENDO_REFRESH_HOUR: ${JAMENDO_REFRESH_HOUR:-4}
      REFRESH_TIMEZONE: ${REFRESH_TIMEZONE:-Asia/Tokyo}
      JAMENDO_LIMIT_PER_CATEGORY: ${JAMENDO_LIMIT_PER_CATEGORY:-200}
      SYNC_COMMANDS: ${SYNC_COMMANDS:-true}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    cpus: "0.50"
    shm_size: 64mb
    command:
      - postgres
      - -c
      - shared_buffers=32MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - max_connections=10
    environment:
      POSTGRES_DB: lofi
      POSTGRES_USER: lofi
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - lofi-postgres
          - postgres
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U lofi -d lofi"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

volumes:
  postgres-data:

networks:
  default:
